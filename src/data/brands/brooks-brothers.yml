fit_notes: |
  America's iconic preppy/formal menswear house since 1818. Brooks Brothers
  publishes the most comprehensive tall dress shirt matrix on the market —
  necks 13" to 20" paired with tall sleeve lengths 35"–39". Some sizes are
  sold as paired sleeve groups (e.g., "36/37") which TallSource resolves to
  the upper end of the pair. Three fit cuts available across most sizes:
  Slim, Regular, and Traditional (Traditional is the most generous through
  the body and arms). Big & Tall sizing covers neck 18"+ with the longest
  reach extending to 39" sleeves at neck 18"–18.5".
