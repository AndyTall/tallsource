fit_notes: |
  Canadian tall-only specialist designed for men 6'1"–7'1". Two fit variants:
  Tall (T) for 6'1"–6'5" with sleeves 37.5"–40"; Extra Tall (XT) for 6'5"+
  with sleeves 39.5"–41.5" and longer back length. Top size charts (hoodies,
  tees, polos, sweaters) vary slightly across product lines — values shown
  here are from the hoodies/sweaters chart, the most comprehensive of their
  catalog. American Tall measures true to spec: their pants waist may run
  slightly smaller than vanity-sized brands. Dress shirts use casual labels
  (MT, LT, etc.) instead of neck x sleeve format.
