fit_notes: |
  American iconic preppy menswear house since 1967 (Polo / Purple Label /
  Double RL family). Tall sizing covers Tall L through Tall 4XL (chest 42"-
  60", sleeves 36.5"-41"). Ralph Lauren does NOT offer Medium Tall — their
  tall line starts at Large Tall. The brand also runs a separate Big line
  (Big 1X-6X, shorter sleeves than the corresponding Tall) which is excluded
  here per TallSource's tall-cut-only rule. Sizes labeled "2L", "3L", "4L"
  on some products are equivalent to Tall 2XL, 3XL, 4XL respectively.
  Notable for running roomier than J.Crew Tall — per Reddit, an RL Tall L
  may be too baggy for someone who fits a J.Crew Tall L. Big & Tall pants
  offer waists 36" through 58" with inseam options 30L/32L/34L/36L/38L;
  only 34L+ qualify as tall (regular inseams 30L/32L excluded from this
  chart per the tall pants threshold rule).
