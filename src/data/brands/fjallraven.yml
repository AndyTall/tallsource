fit_notes: |
  Swedish heritage outdoor brand (founded 1960) — Greenland Jacket, anorak
  parkas, G-1000 fabric pieces. Fjällräven offers TWO fits in men's jackets
  and tops: "Regular Fit" (the longer-cut traditional pattern shown in this
  chart, with arm lengths up to 36.2") and a newer "New Fit" with shorter
  sleeves (L=34.3", XL=34.6", XXL=34.6", 3XL=35.0"). Most Fjällräven men's
  outerwear is cut in the Regular Fit; check the product page on
  fjallraven.com to confirm which fit any specific item uses. The brand
  itself does NOT use Tall labels — these regular S/M/L/XL labels run
  longer than typical regular cuts, which is why the brand is recommended
  for tall guys (per Reddit's r/tallfashionadvice). Fjällräven labels the
  largest size "XXXL" on their site; TallSource normalizes to "3XL" for
  filter consistency.
