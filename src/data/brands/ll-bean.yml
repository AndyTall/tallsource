fit_notes: |
  Classic American outdoor/heritage casualwear from Maine since 1912. Tall
  garments run 2 inches longer in the body and 1 inch longer at the sleeves
  than regular sizes (per L.L.Bean's published sizing guide). Pants offered
  in 34" and 36" inseams across waists 30 to 46 (1" steps from 30 to 38,
  then 2" steps).
